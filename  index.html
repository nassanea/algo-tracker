<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演算法刷題追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #151820;
    --surface2:  #1c2030;
    --border:    #252a3a;
    --text:      #dde2f0;
    --muted:     #55607a;
    --accent:    #5b8dee;
    --green:     #4ade80;
    --amber:     #fbbf24;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,15,20,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .logo {
    font-family: var(--mono);
    font-size: 14px; font-weight: 700;
    color: var(--accent);
    letter-spacing: .04em;
  }
  .save-badge {
    font-family: var(--mono);
    font-size: 11px; color: var(--green);
    opacity: 0; transition: opacity .4s;
  }
  .save-badge.show { opacity: 1; }

  /* overall bar */
  .overall {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .overall-label { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .overall-track {
    flex: 1; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden;
  }
  .overall-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #3b6fd4, #5b8dee, #7cb3ff);
    transition: width .5s ease;
  }
  .overall-pct { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 36px; text-align: right; }

  /* category pills */
  .cat-pills {
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .cat-pills::-webkit-scrollbar { display: none; }
  .pill {
    padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; white-space: nowrap;
    transition: all .15s;
  }
  .pill:hover { color: var(--text); border-color: var(--muted); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Main ── */
  main { max-width: 640px; margin: 0 auto; padding: 20px 16px; }

  /* controls row */
  .controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .count-label { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .opt-toggle {
    font-size: 11px; font-family: var(--mono);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--amber); padding: 4px 10px; border-radius: 99px; cursor: pointer;
    transition: all .15s;
  }
  .opt-toggle:hover { border-color: var(--amber); }
  .opt-toggle.on { background: rgba(251,191,36,.12); border-color: var(--amber); }

  /* cat section */
  .cat-section { margin-bottom: 28px; }
  .cat-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .cat-badge {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 6px;
  }
  .cat-prog { flex: 1; }
  .cat-prog-track {
    height: 3px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 2px;
  }
  .cat-prog-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
  .cat-prog-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* problem row */
  .prob-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    margin-bottom: 5px;
    transition: opacity .2s, border-color .2s;
    cursor: default;
  }
  .prob-row:hover { border-color: #2d3450; }
  .prob-row.done { opacity: .45; }
  .prob-row.optional {
    border-style: dashed; background: transparent;
  }

  /* check btn */
  .check-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .18s;
  }
  .check-btn:hover { border-color: var(--green); }
  .check-btn.checked { background: var(--green); border-color: var(--green); }
  .check-btn svg { display: none; }
  .check-btn.checked svg { display: block; }

  /* prob info */
  .prob-info { flex: 1; min-width: 0; }
  .prob-title {
    font-size: 13px; color: var(--text); line-height: 1.4;
    display: flex; align-items: baseline; gap: 5px; flex-wrap: wrap;
  }
  .prob-num { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .prob-title-text { }
  .done .prob-title-text { text-decoration: line-through; color: var(--muted); }
  .prob-meta {
    display: flex; align-items: center; gap: 8px; margin-top: 2px; flex-wrap: wrap;
  }
  .done-date { font-family: var(--mono); font-size: 10px; color: var(--green); }
  .note-preview { font-size: 10px; color: var(--muted); max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* tags */
  .opt-tag {
    font-size: 10px; font-family: var(--mono);
    color: var(--amber); background: rgba(251,191,36,.1);
    border: 1px solid rgba(251,191,36,.2);
    padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
  }

  /* note btn */
  .note-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: transparent; border: 1px solid transparent;
    cursor: pointer; font-size: 14px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .note-btn:hover { border-color: var(--border); color: var(--text); }
  .note-btn.has-note { color: var(--amber); }

  /* ── Note Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.75);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface2); border-radius: 16px 16px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    padding: 20px; width: 100%; max-width: 640px;
    transform: translateY(20px); transition: transform .25s ease;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .modal-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .modal textarea {
    width: 100%; height: 160px; resize: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; font-family: var(--mono);
    font-size: 12px; color: var(--text); outline: none;
    transition: border-color .15s; line-height: 1.7;
  }
  .modal textarea:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn-save {
    flex: 1; background: var(--accent); border: none;
    color: #fff; padding: 10px; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  .btn-save:hover { background: #6b9ef8; }
  .btn-cancel {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); padding: 10px; border-radius: 10px;
    font-size: 13px; cursor: pointer; transition: all .15s;
  }
  .btn-cancel:hover { color: var(--text); }

  /* category colors */
  .c-bt { color: #60a5fa; background: rgba(96,165,250,.15); }
  .c-bk { color: #c084fc; background: rgba(192,132,252,.15); }
  .c-gr { color: #4ade80; background: rgba(74,222,128,.15); }
  .c-ms { color: #fb923c; background: rgba(251,146,60,.15); }
  .c-dp { color: #f87171; background: rgba(248,113,113,.15); }
  .c-gp { color: #22d3ee; background: rgba(34,211,238,.15); }
  .fill-bt { background: #60a5fa; }
  .fill-bk { background: #c084fc; }
  .fill-gr { background: #4ade80; }
  .fill-ms { background: #fb923c; }
  .fill-dp { background: #f87171; }
  .fill-gp { background: #22d3ee; }

  .footer {
    text-align: center; margin-top: 32px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
</style>
</head>

  const badge = document.getElementById("saveBadge");
  badge.classList.add("show");
  setTimeout(() => badge.classList.remove("show"), 1200);
}

// ── Render ──
function render() {
  renderPills();
  renderList();
  renderOverall();
}

function renderPills() {
  const wrap = document.getElementById("catPills");
  const tabs = ["全部", ...CATS];
  wrap.innerHTML = tabs.map(t => `
    <button class="pill ${t===activeTab?"active":""}" onclick="setTab('${t}')">${t}</button>
  `).join("");
}

function renderOverall() {
  const must = PROBLEMS.filter(p=>p.pri==="必做");
  const done = must.filter(p=>completions[p.id]).length;
  const pct = Math.round(done/must.length*100);
  document.getElementById("overallFill").style.width = pct+"%";
  document.getElementById("overallPct").textContent = done+"/"+must.length;
}

function renderList() {
  const catsToShow = activeTab==="全部" ? CATS : [activeTab];
  let html = "";
  let totalShown = 0;

  for (const cat of catsToShow) {
    const info = CAT_INFO[cat];
    const probs = PROBLEMS.filter(p => {
      if (p.cat !== cat) return false;
      if (!showOptional && p.pri==="選做") return false;
      return true;
    });
    if (!probs.length) continue;
    totalShown += probs.length;

    const must = PROBLEMS.filter(p=>p.cat===cat&&p.pri==="必做");
    const done = must.filter(p=>completions[p.id]).length;
    const pct = Math.round(done/must.length*100);

    html += `<div class="cat-section">`;
    if (activeTab==="全部") {
      html += `
        <div class="cat-header">
          <span class="cat-badge ${info.cls}">${cat}</span>
          <div class="cat-prog">
            <div class="cat-prog-track">
              <div class="cat-prog-fill ${info.fill}" style="width:${pct}%"></div>
            </div>
            <div class="cat-prog-label">${done} / ${must.length} 必做完成</div>
          </div>
        </div>`;
    }

    for (const p of probs) {
      const isDone = !!completions[p.id];
      const hasNote = !!notes[p.id];
      const isOpt = p.pri==="選做";
      html += `
        <div class="prob-row ${isDone?"done":""} ${isOpt?"optional":""}">
          <button class="check-btn ${isDone?"checked":""}" onclick="toggle('${p.id}')">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="prob-info">
            <div class="prob-title">
              ${p.no?`<span class="prob-num">${p.no}.</span>`:""}
              <span class="prob-title-text">${p.title}</span>
            </div>
            <div class="prob-meta">
              ${isDone?`<span class="done-date">${completions[p.id]} 完成</span>`:""}
              ${hasNote?`<span class="note-preview">${esc(notes[p.id])}</span>`:""}
            </div>
          </div>
          ${isOpt?`<span class="opt-tag">選做</span>`:""}
          <button class="note-btn ${hasNote?"has-note":""}" onclick="openNote('${p.id}')" title="筆記">
            ${hasNote?"📝":"✎"}
          </button>
        </div>`;
    }
    html += `</div>`;
  }

  document.getElementById("list").innerHTML = html;
  const must = PROBLEMS.filter(p=>p.pri==="必做"&&(activeTab==="全部"||p.cat===activeTab));
  const done = must.filter(p=>completions[p.id]).length;
  document.getElementById("countLabel").textContent = `顯示 ${totalShown} 題　必做 ${done}/${must.length}`;
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Actions ──
window.setTab = function(t) { activeTab = t; render(); };

window.toggle = function(id) {
  if (completions[id]) delete completions[id];
  else {
    const now = new Date();
    completions[id] = `${now.getMonth()+1}/${now.getDate()}`;
  }
  save(); render();
};

window.openNote = function(id) {
  editId = id;
  const p = PROBLEMS.find(x=>x.id===id);
  document.getElementById("modalTitle").textContent = (p.no ? p.no+". " : "") + p.title;
  document.getElementById("modalTextarea").value = notes[id]||"";
  document.getElementById("modalBackdrop").classList.add("open");
  setTimeout(()=>document.getElementById("modalTextarea").focus(),200);
};

document.getElementById("btnSave").onclick = function() {
  const val = document.getElementById("modalTextarea").value.trim();
  if (val) notes[editId] = val; else delete notes[editId];
  editId = null;
  document.getElementById("modalBackdrop").classList.remove("open");
  save(); render();
};
document.getElementById("btnCancel").onclick = function() {
  editId = null;
  document.getElementById("modalBackdrop").classList.remove("open");
};
document.getElementById("modalBackdrop").onclick = function(e) {
  if (e.target === this) document.getElementById("btnCancel").click();
};

document.getElementById("optToggle").onclick = function() {
  showOptional = !showOptional;
  this.textContent = showOptional ? "▲ 隱藏選做" : "▼ 顯示選做";
  this.classList.toggle("on", showOptional);
  render();
};

// ── Init ──
load();
render();
</script>
</body>
</html>
